name: Build C# Backup Executables

on:
  push: 
    branches:
      - master

jobs:
  build:
    name: Build for ${{ matrix.rid }}
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        include:
          # - os: windows-latest
          #   rid: win-x64
          - os: ubuntu-latest
            rid: linux-x64
          - os: macos-latest
            rid: osx-x64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x' 

      - name: Restore dependencies
        run: dotnet restore

      - name: Publish self-contained binary
        run: |
          dotnet publish -c Release -r ${{ matrix.rid }} \
            --self-contained true \
            -p:PublishReadyToRun=true \
            -p:PublishSingleFile=true \
            -o publish/${{ matrix.rid }}

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: backup-${{ matrix.rid }}
          path: publish/${{ matrix.rid }}
          archive: 'false'
      - uses: softprops/action-gh-release@v2
        with:
          token: '${{ github.token }}'
          tag_name: ${{ github.run_id }}
          body: |
            ByteMeBackup Auto Release for Github.
          files: "backup-${{ matrix.rid }}"
